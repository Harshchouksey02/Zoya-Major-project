server.port=5000

# H2 In-Memory Database (no MySQL needed - data resets on restart)
spring.datasource.url=jdbc:h2:mem:agroveda_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (for debugging - visit http://localhost:5000/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Custom configurations
agroveda.jwt.secret=agroveda_super_secret_key_12345_must_be_long_enough_to_be_secure_32_bytes
agroveda.jwt.expiration-ms=86400000

# Force Jackson to serialize/deserialize all JSON fields using snake_case (e.g. image_url, name_hindi)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Razorpay Credentials (Leave blank to run in mock simulation mode)
razorpay.key.id=
razorpay.key.secret=


